<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Ikonex Academy</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Ikonex Academy</h2>
                <p>SMS</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">📊 Dashboard</a>
                <a href="students.html" class="nav-item">👨‍🎓 Students</a>
                <a href="class-streams.html" class="nav-item">📚 Class Streams</a>
                <a href="subjects.html" class="nav-item active">📖 Subjects</a>
                <a href="scores.html" class="nav-item">✏️ Enter Scores</a>
                <a href="reports.html" class="nav-item">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Subject Management</h1>
                <button class="btn btn-primary" onclick="openAddSubjectModal()">+ Add Subject</button>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>Subject Name</th><th>Code</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="subjectsBody">
                        <tr><td colspan="3">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Subject Modal -->
    <div id="subjectModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="subjectModalTitle">Add Subject</h2>
                <span class="close" onclick="closeSubjectModal()">&times;</span>
            </div>
            <form id="subjectForm" onsubmit="saveSubject(event)">
                <input type="hidden" id="subjectId">
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="subjectName" required>
                </div>
                <div class="form-group">
                    <label>Subject Code</label>
                    <input type="text" id="subjectCode" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn" onclick="closeSubjectModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/subjects.js"></script>
</body>
</html>
