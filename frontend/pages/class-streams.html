<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Streams - Ikonex Academy</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Ikonex Academy</h2>
                <p>SMS</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">📊 Dashboard</a>
                <a href="students.html" class="nav-item">👨‍🎓 Students</a>
                <a href="class-streams.html" class="nav-item active">📚 Class Streams</a>
                <a href="subjects.html" class="nav-item">📖 Subjects</a>
                <a href="scores.html" class="nav-item">✏️ Enter Scores</a>
                <a href="reports.html" class="nav-item">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Class Stream Management</h1>
                <button class="btn btn-primary" onclick="openAddClassModal()">+ Add Class Stream</button>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>Class Name</th><th>Code</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="classStreamsBody">
                        <tr><td colspan="3">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Class Modal -->
    <div id="classModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="classModalTitle">Add Class Stream</h2>
                <span class="close" onclick="closeClassModal()">&times;</span>
            </div>
            <form id="classForm" onsubmit="saveClassStream(event)">
                <input type="hidden" id="classId">
                <div class="form-group">
                    <label>Class Name</label>
                    <input type="text" id="className" required>
                </div>
                <div class="form-group">
                    <label>Class Code</label>
                    <input type="text" id="classCode" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn" onclick="closeClassModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/classStreams.js"></script>
</body>
</html>
