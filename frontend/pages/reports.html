<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Ikonex Academy</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Ikonex Academy</h2>
                <p>SMS</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">📊 Dashboard</a>
                <a href="students.html" class="nav-item">👨‍🎓 Students</a>
                <a href="class-streams.html" class="nav-item">📚 Class Streams</a>
                <a href="subjects.html" class="nav-item">📖 Subjects</a>
                <a href="scores.html" class="nav-item">✏️ Enter Scores</a>
                <a href="reports.html" class="nav-item active">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Class Performance Reports</h1>
            </header>

            <div class="form-container">
                <div class="form-group">
                    <label>Select Class</label>
                    <select id="classSelect">
                        <option value="">-- Select a class --</option>
                    </select>
                </div>
            </div>

            <div id="rankingContainer" style="display: none;">
                <div class="table-container">
                    <h3>Class Ranking</h3>
                    <table class="data-table">
                        <thead>
                            <tr><th>Position</th><th>Admission No</th><th>Student Name</th><th>Total Marks</th><th>Average</th><th>Grade</th></tr>
                        </thead>
                        <tbody id="rankingBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DIRECT API URL - NO DEPENDENCIES
        const API_URL = 'http://localhost:5001/api';
        const CURRENT_TERM = 'Term 1';
        const CURRENT_YEAR = '2025-2026';

        // Load classes
        async function loadClasses() {
            try {
                const response = await fetch(API_URL + '/class-streams');
                const data = await response.json();
                
                const select = document.getElementById('classSelect');
                select.innerHTML = '<option value="">-- Select a class --</option>';
                
                for (let i = 0; i < data.data.length; i++) {
                    const cls = data.data[i];
                    const option = document.createElement('option');
                    option.value = cls.id;
                    option.textContent = cls.name + ' (' + cls.code + ')';
                    select.appendChild(option);
                }
                
                console.log('Classes loaded:', data.data.length);
            } catch (error) {
                console.error('Error:', error);
                alert('Error loading classes: ' + error.message);
            }
        }

        // Load ranking
        async function loadRanking() {
            const classId = document.getElementById('classSelect').value;
            if (!classId) {
                document.getElementById('rankingContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('rankingContainer').style.display = 'block';
            const tbody = document.getElementById('rankingBody');
            tbody.innerHTML = '<td><td colspan="6">Loading...</td></tr>';
            
            try {
                const url = API_URL + '/reports/class-ranking/' + classId + '/' + CURRENT_TERM + '/' + CURRENT_YEAR;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    let html = '';
                    for (let i = 0; i < data.data.length; i++) {
                        const s = data.data[i];
                        let grade = 'E';
                        if (s.average_score >= 80) grade = 'A';
                        else if (s.average_score >= 70) grade = 'B';
                        else if (s.average_score >= 60) grade = 'C';
                        else if (s.average_score >= 50) grade = 'D';
                        
                        html += '<tr>';
                        html += '<td>' + (s.position || (i+1)) + '</td>';
                        html += '<td>' + (s.admission_number || '-') + '</td>';
                        html += '<td>' + (s.full_name || '-') + '</td>';
                        html += '<td>' + (s.total_marks || 0) + '</td>';
                        html += '<td>' + (s.average_score ? s.average_score.toFixed(2) : '0') + '</td>';
                        html += '<td><strong>' + grade + '</strong></td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="6">No scores entered for this class yet. Go to Enter Scores page first. </td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                tbody.innerHTML = '<tr><td colspan="6">Error: ' + error.message + '</td></tr>';
            }
        }

        // Initialize
        loadClasses();
        document.getElementById('classSelect').onchange = loadRanking;
    </script>
</body>
</html>
