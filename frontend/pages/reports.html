<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Ikonex Academy</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Ikonex Academy</h2>
                <p>SMS</p>
            </div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">📊 Dashboard</a>
                <a href="students.html" class="nav-item">👨‍🎓 Students</a>
                <a href="class-streams.html" class="nav-item">📚 Class Streams</a>
                <a href="subjects.html" class="nav-item">📖 Subjects</a>
                <a href="scores.html" class="nav-item">✏️ Enter Scores</a>
                <a href="reports.html" class="nav-item active">📈 Reports</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Class Performance Reports</h1>
            </header>

            <div class="form-container">
                <div class="form-group">
                    <label>Select Class</label>
                    <select id="classSelect">
                        <option value="">-- Select a class --</option>
                    </select>
                </div>
            </div>

            <div id="rankingContainer" style="display: none;">
                <div class="table-container">
                    <h3>Class Ranking</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Position</th>
                                <th>Admission No</th>
                                <th>Student Name</th>
                                <th>Total Marks</th>
                                <th>Average</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody id="rankingBody">
                            <tr><td colspan="6">Select a class to view ranking</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // YOUR BACKEND IS ON PORT 5001
        const API_URL = 'http://localhost:5001/api';
        
        // Load classes when page loads
        async function loadClasses() {
            try {
                const response = await fetch(API_URL + '/class-streams');
                const result = await response.json();
                
                const select = document.getElementById('classSelect');
                select.innerHTML = '<option value="">-- Select a class --</option>';
                
                if (result.success && result.data) {
                    for (let i = 0; i < result.data.length; i++) {
                        const cls = result.data[i];
                        const option = document.createElement('option');
                        option.value = cls.id;
                        option.textContent = cls.name + ' (' + cls.code + ')';
                        select.appendChild(option);
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('classSelect').innerHTML = '<option value="">Backend not running on port 5001</option>';
            }
        }

        // Load ranking when class is selected
        async function loadRanking() {
            const classId = document.getElementById('classSelect').value;
            if (!classId) {
                document.getElementById('rankingContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('rankingContainer').style.display = 'block';
            const tbody = document.getElementById('rankingBody');
            tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
            
            try {
                const url = API_URL + '/reports/class-ranking/' + classId + '/Term%201/2025-2026';
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success && result.data && result.data.length > 0) {
                    let html = '';
                    for (let i = 0; i < result.data.length; i++) {
                        const s = result.data[i];
                        let grade = 'E';
                        if (s.average_score >= 80) grade = 'A';
                        else if (s.average_score >= 70) grade = 'B';
                        else if (s.average_score >= 60) grade = 'C';
                        else if (s.average_score >= 50) grade = 'D';
                        
                        html += '<tr>';
                        html += '<td>' + (s.position || (i+1)) + '</td>';
                        html += '<td>' + (s.admission_number || '-') + '</td>';
                        html += '<td>' + (s.full_name || '-') + '</td>';
                        html += '<td>' + (s.total_marks || 0) + '</td>';
                        html += '<td>' + (s.average_score ? s.average_score.toFixed(2) : '0') + '</td>';
                        html += '<td><strong>' + grade + '</strong></td>';
                        html += '</tr>';
                    }
                    tbody.innerHTML = html;
                } else {
                    tbody.innerHTML = '<tr><td colspan="6">No scores entered for this class yet.</td></tr>';
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6">Error: ' + error.message + '</td></tr>';
            }
        }

        // Setup when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadClasses();
            document.getElementById('classSelect').onchange = loadRanking;
        });
    </script>
</body>
</html>
